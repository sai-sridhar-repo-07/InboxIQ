<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none" role="img" aria-label="Mailair">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <rect width="56" height="56" rx="13" fill="url(#bg)"/>
  <path d="M10,38 L44,13 L37,30 Z" fill="white"/>
  <path d="M10,38 L37,30 L30,46 Z" fill="rgba(255,255,255,0.65)"/>
  <line x1="10" y1="38" x2="37" y2="30" stroke="rgba(29,78,216,0.18)" stroke-width="0.8"/>
  <circle cx="9" cy="41" r="1.8" fill="rgba(255,255,255,0.45)"/>
  <circle cx="6" cy="44" r="1.2" fill="rgba(255,255,255,0.28)"/>

  <!-- Wordmark: Mail (dark) + air (blue) -->
  <text
    x="68"
    y="37"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="27"
    font-weight="700"
    letter-spacing="-0.6"
  >
    <tspan fill="#0f172a">Mail</tspan><tspan fill="#2563eb">air</tspan>
  </text>
</svg>
