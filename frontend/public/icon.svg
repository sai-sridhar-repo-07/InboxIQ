<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none" role="img" aria-label="Mailair">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e40af"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <rect width="56" height="56" rx="13" fill="url(#bg)"/>

  <!-- M letterform — left vertical leg -->
  <line x1="13" y1="43" x2="13" y2="19" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left antenna dot (signal transmitter) -->
  <circle cx="13" cy="12" r="3.2" fill="white"/>

  <!-- M center chevron (left slope down) -->
  <line x1="13" y1="19" x2="28" y2="32" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- M center chevron (right slope up) -->
  <line x1="28" y1="32" x2="43" y2="19" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- M letterform — right vertical leg -->
  <line x1="43" y1="19" x2="43" y2="43" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right antenna dot (signal transmitter) -->
  <circle cx="43" cy="12" r="3.2" fill="white"/>
</svg>
