<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 56" fill="none" role="img" aria-label="Mailair">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <rect width="56" height="56" rx="13" fill="url(#bg)"/>
  <line x1="21" y1="18" x2="18" y2="9"  stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.55"/>
  <line x1="28" y1="18" x2="28" y2="6"  stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="35" y1="18" x2="38" y2="9"  stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.55"/>
  <rect x="9" y="20" width="38" height="27" rx="3.5" stroke="white" stroke-width="2.2" fill="rgba(255,255,255,0.1)"/>
  <path d="M9,22 L28,34 L47,22" stroke="white" stroke-width="2.2" fill="none" stroke-linejoin="round"/>

  <!-- Wordmark (dark background variant) -->
  <text
    x="68"
    y="38"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="-0.8"
  >
    <tspan fill="white">Mail</tspan><tspan fill="#60a5fa">air</tspan>
  </text>
